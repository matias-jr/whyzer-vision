<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>You're in — Whyzer x Zapier RKO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070B17; color: #F0F4FF; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    a { color: #7FA2FF; }
    a:hover { color: #A6C1FF; }
  </style>
</head>
<body>
  <div style="min-height: 100vh; width: 100%; background: #070B17; color: #F0F4FF; display: flex; align-items: center; justify-content: center; padding: 32px 20px; box-sizing: border-box;">
    <div style="width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 32px;">

      <!-- Lockup -->
      <div style="display: flex; align-items: center; justify-content: center; gap: 16px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div style="width: 18px; height: 18px; background: #3B6FF0; border-radius: 4px; transform: rotate(45deg);"></div>
          <span style="font-weight: 800; font-size: 20px; letter-spacing: -0.02em;">Whyzer</span>
        </div>
        <span style="font-size: 14px; color: rgba(240,244,255,0.3); font-weight: 400;">&times;</span>
        <span style="font-weight: 700; font-size: 18px; letter-spacing: -0.01em; color: #FF4F00;">zapier</span>
      </div>

      <div style="width: 100%; height: 1px; background: rgba(240,244,255,0.08);"></div>

      <!-- Confirmation -->
      <div style="display: flex; flex-direction: column; gap: 12px; text-align: center;">
        <h1 style="margin: 0; font-weight: 800; font-size: 40px; line-height: 1.1; letter-spacing: -0.035em;">You're in.</h1>
        <div style="font-size: 15px; color: rgba(240,244,255,0.5);">14 days of access, tied to your July 29 RKO with Jamal. No charge, nothing to cancel.</div>
      </div>

      <!-- Next steps -->
      <div style="display: flex; flex-direction: column; gap: 28px;">
        <div style="display: flex; gap: 18px; align-items: flex-start;">
          <div style="font-weight: 800; font-size: 22px; color: #3B6FF0; letter-spacing: -0.02em; min-width: 24px;">1</div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <div style="font-weight: 700; font-size: 17px;">Check your inbox</div>
            <div style="font-size: 15px; line-height: 1.6; color: rgba(240,244,255,0.65);">Look for an email from info@whyzer.ai. If it's not there in two minutes, check spam. That email has your Whyzer login link.</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
